<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case File — Naruephon Yotmao</title>
  <meta name="description"
    content="Long-form business analysis case files by Naruephon Yotmao — civic tech, spatial analytics, and the messy work between stakeholders and data.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --bone: #f5f1ea;
      --bone-2: #ede7db;
      --iron: #1a1a1a;
      --iron-2: #2a2a2a;
      --graphite: #4a4a4a;
      --pencil: #807a6d;
      --oxide: #c1440e;
      --moss: #3d5a3d;
      --rule: #d9d1c0;
      --rule-2: #c4bba7;

      --serif: 'Fraunces', Georgia, serif;
      --italic: 'Instrument Serif', Georgia, serif;
      --mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bone);
      color: var(--iron);
      font-family: var(--serif);
      font-feature-settings: "ss01", "ss02", "liga";
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    /* Reading progress bar */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: transparent;
      z-index: 100;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--oxide);
      transition: width 0.1s linear;
    }

    /* Masthead — slim version */
    .masthead {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--rule);
      background: var(--bone);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    @media (max-width: 800px) {
      .masthead {
        grid-template-columns: 1fr auto;
        padding: 14px 20px;
      }
    }

    .masthead-left {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--pencil);
      letter-spacing: 0.04em;
    }

    .masthead-left em {
      font-style: normal;
      color: var(--iron);
      font-weight: 500;
    }

    .masthead-center {
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 0.02em;
      text-align: center;
      font-weight: 400;
    }

    .masthead-right {
      display: flex;
      justify-content: flex-end;
      gap: 22px;
    }

    .masthead-right a {
      font-family: var(--mono);
      font-size: 11px;
      text-decoration: none;
      color: var(--graphite);
      letter-spacing: 0.05em;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: .2s;
    }

    .masthead-right a:hover {
      color: var(--iron);
      border-bottom-color: var(--oxide);
    }

    @media (max-width: 800px) {
      .masthead-right {
        display: none;
      }
    }

    /* Page shell */
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 40px 120px;
    }

    @media (max-width: 800px) {
      .page {
        padding: 40px 24px 80px;
      }
    }

    .case-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--pencil);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 40px;
      transition: color .2s;
    }

    .case-back::before {
      content: '←';
      transition: transform .2s;
    }

    .case-back:hover {
      color: var(--iron);
    }

    .case-back:hover::before {
      transform: translateX(-3px);
    }

    /* Case header */
    .case-header {
      margin-bottom: 56px;
    }

    .case-flag {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 18px;
      padding-bottom: 20px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--pencil);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .case-flag .folio {
      color: var(--iron);
      font-weight: 500;
      border: 1px solid var(--iron);
      padding: 4px 10px;
    }

    .case-flag .dot {
      color: var(--rule-2);
    }

    .case-headline {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 76px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 350;
      font-variation-settings: "opsz" 96;
      max-width: 960px;
      margin: 0 0 32px;
    }

    .case-headline em {
      font-family: var(--italic);
      color: var(--oxide);
      font-style: italic;
      font-weight: 400;
    }

    .case-client {
      font-family: var(--italic);
      font-style: italic;
      font-size: 20px;
      color: var(--graphite);
      margin-bottom: 32px;
    }

    /* TL;DR block */
    .tldr {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--iron);
      border-bottom: 1px solid var(--rule);
    }

    @media (max-width: 700px) {
      .tldr {
        grid-template-columns: 1fr;
      }
    }

    .tldr-item {
      padding: 20px 24px 22px;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tldr-item:last-child {
      border-right: 0;
    }

    @media (max-width: 700px) {
      .tldr-item {
        border-right: 0;
        border-bottom: 1px solid var(--rule);
      }

      .tldr-item:last-child {
        border-bottom: 0;
      }
    }

    .tldr-label {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--oxide);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tldr-value {
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.45;
      color: var(--iron);
      font-weight: 400;
    }

    .tldr-value em {
      font-family: var(--italic);
      font-style: italic;
      color: var(--oxide);
    }

    /* Case body — beats */
    .case-body {
      max-width: 740px;
      margin: 0 auto;
    }

    .beat {
      padding: 56px 0;
      border-bottom: 1px solid var(--rule);
    }

    .beat:last-child {
      border-bottom: 0;
    }

    .beat-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--oxide);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .beat-num em {
      font-family: var(--italic);
      font-style: italic;
      color: var(--iron);
      font-size: 16px;
    }

    .beat h2 {
      font-family: var(--serif);
      font-size: clamp(28px, 3.6vw, 42px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-weight: 400;
      font-variation-settings: "opsz" 48;
      margin: 0 0 28px;
    }

    .beat h2 em {
      font-family: var(--italic);
      color: var(--oxide);
      font-style: italic;
    }

    .beat p {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.65;
      color: var(--iron);
      font-weight: 350;
      font-variation-settings: "opsz" 20;
      margin: 0 0 20px;
    }

    .beat p em {
      font-family: var(--italic);
      font-style: italic;
      color: var(--oxide);
    }

    .beat p strong {
      font-weight: 500;
      color: var(--iron);
    }

    .beat ul {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
    }

    .beat ul li {
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.6;
      color: var(--iron);
      font-weight: 350;
      padding: 14px 0 14px 28px;
      position: relative;
      border-bottom: 1px solid var(--rule);
    }

    .beat ul li:last-child {
      border-bottom: 0;
    }

    .beat ul li::before {
      content: '§';
      position: absolute;
      left: 0;
      top: 14px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--oxide);
    }

    .beat ul li strong {
      font-weight: 500;
      color: var(--iron);
      display: block;
      margin-bottom: 2px;
    }

    .beat ul li em {
      font-family: var(--italic);
      color: var(--oxide);
      font-style: italic;
    }

    /* Pull quote */
    .pull {
      font-family: var(--italic);
      font-style: italic;
      font-size: clamp(22px, 2.8vw, 30px);
      line-height: 1.3;
      color: var(--iron);
      max-width: 640px;
      margin: 40px auto;
      padding: 24px 32px;
      position: relative;
      border-left: 2px solid var(--oxide);
    }

    .pull::before,
    .pull::after {
      content: '"';
      color: var(--oxide);
      font-family: var(--italic);
      font-size: 32px;
      line-height: 0;
    }

    .pull::before {
      margin-right: 4px;
    }

    .pull::after {
      margin-left: 2px;
    }

    /* Beat intro — used for the hand-off opener */
    .beat-intro {
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1.5;
      color: var(--iron);
      font-weight: 350;
      font-style: italic;
      max-width: 640px;
      margin-bottom: 28px;
      font-variation-settings: "opsz" 28;
    }

    /* Footer */
    .case-foot {
      max-width: 740px;
      margin: 64px auto 0;
      padding-top: 40px;
      border-top: 1px solid var(--iron);
    }

    .foot-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 24px;
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
    }

    .foot-row:last-of-type {
      border-bottom: 0;
    }

    .foot-label {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--oxide);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .foot-value {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.5;
      color: var(--iron);
    }

    .foot-value em {
      font-family: var(--italic);
      font-style: italic;
      color: var(--pencil);
    }

    .foot-cta {
      margin-top: 48px;
      padding: 32px;
      border: 1px solid var(--iron);
      background: #fbf7ee;
    }

    .foot-cta p {
      font-family: var(--italic);
      font-style: italic;
      font-size: 20px;
      line-height: 1.45;
      color: var(--iron);
      margin: 0 0 16px;
      max-width: 560px;
    }

    .foot-cta a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--iron);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--iron);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: .2s;
    }

    .foot-cta a::after {
      content: '→';
      transition: transform .2s;
    }

    .foot-cta a:hover {
      background: var(--iron);
      color: var(--bone);
    }

    .foot-cta a:hover::after {
      transform: translateX(3px);
    }

    /* Not found state */
    .not-found {
      max-width: 640px;
      margin: 80px auto;
      text-align: center;
    }

    .not-found h1 {
      font-family: var(--serif);
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 350;
      margin: 0 0 20px;
    }

    .not-found p {
      font-family: var(--italic);
      font-style: italic;
      font-size: 20px;
      color: var(--graphite);
      margin: 0 0 32px;
    }

    .not-found a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--iron);
      border-bottom: 1px solid var(--iron);
      padding-bottom: 3px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <header class="masthead">
    <div class="masthead-left"><em>Case file</em> · long-form</div>
    <div class="masthead-center">Atelier &amp; Field Notes</div>
    <nav class="masthead-right">
      <a href="index.html#case-files">All cases</a>
      <a href="index.html#journal">Journal</a>
      <a href="index.html#colophon">Contact</a>
    </nav>
  </header>

  <main class="page" id="page"></main>

  <script>
    // ═══════════════════════════════════════════
    // Case file data — inline for now (no Supabase table yet)
    // ═══════════════════════════════════════════
    const CASES = {
      'kad-kong-ta': {
        folio: '№ 01',
        category: 'Civic Tech',
        date: 'Apr 2026',
        readMin: 5,
        client: 'Lampang City Municipality — Kad Kong Ta Weekend Night Market',
        headline: 'Making a weekend night market <em>visible to the people who run it.</em>',
        tldr: {
          problem: 'Pull visitors into the back half of a 700-metre market — with <em>no</em> historical headcount data.',
          role: 'Business Analyst / Project Manager on a CAMT project team; owner of the metrics &amp; alerts layer.',
          outcome: 'A Smart Insight dashboard plus a LINE alert system the municipality can point to when <em>defending its budget.</em>'
        },
        beats: [
          {
            num: '01', kicker: 'The hand-off', title: 'A vendor economy running on vibes.',
            intro: `Lampang City Municipality came to our team with a spatial economics problem.`,
            body: `
              <p>Every Saturday night, thousands of people pour into the front of Kad Kong Ta — the Instagrammable end, where shops are packed — and most of them turn around and leave without ever reaching the middle or the back. Vendors in the back zones were quietly dying. The city wanted to draw people deeper into the market, but they had no headcount data to justify what they were about to spend.</p>
              <p>I remember the weight of it landing. A municipality was about to make budget decisions on events that affect real vendors' rent and real people's livelihoods, and the entire plan was built on <em>"we feel like Saturday is busier than Sunday."</em> That stuck with me. Public money shouldn't run on vibes.</p>
            `
          },
          {
            num: '02', kicker: 'The question I asked first', title: 'Before we drew a single wireframe.',
            body: `
              <p>I kept the team on one question:</p>
            `,
            pull: 'Instead of guessing where people gather, how do we turn the cameras the city already owns into a tool that can answer three things — where people are, how long they stay, and where they don’t go?',
            after: `
              <p>The reframe mattered. It meant we weren't proposing new hardware the city would have to budget for. We were proposing a way to make an existing, unused data stream <em>legible.</em></p>
            `
          },
          {
            num: '03', kicker: 'The mess I found', title: 'Three obstacles underneath the neat question.',
            body: `
              <ul>
                <li><strong>The front-vs-back asymmetry was brutal.</strong> The front zone was packed shoulder-to-shoulder; the back was a ghost town. Vendors paying similar rent were getting radically different foot traffic, and the municipality had no language to price that difference.</li>
                <li><strong>The weather owned the data.</strong> Northern Thailand during burning season means PM2.5 spikes and sudden rain cancel a market night. Our foot-traffic baseline was being contaminated by variables nobody was capturing.</li>
                <li><strong>The city was spending at the wrong hours.</strong> Staff were deployed on instinct — more security at 7pm because <em>"that feels busy"</em> — with zero evidence of when the real peaks were. Every inefficient shift was a line item on a public budget.</li>
              </ul>
            `,
            pull: 'Vendors paying similar rent were getting radically different foot traffic, and the municipality had no language to price that difference.'
          },
          {
            num: '04', kicker: 'The moves I made', title: 'Scope the metrics first. Dashboard second.',
            body: `
              <ul>
                <li><strong>Scoped the metric stack first, the dashboard second.</strong> I wrote down every metric we might surface — heatmap, zone dwell time, traffic flow vectors, peak-hour curves — and forced the team to pick the three the municipality would actually use on Monday morning. It cut scope in half.</li>
                <li><strong>Made the weather a first-class citizen, not an excuse.</strong> We integrated PM2.5 and rain-risk feeds into the same dashboard so every foot-traffic chart had environmental context next to it — you stopped asking <em>"why was Saturday slow?"</em> and started seeing <em>"Saturday had AQI 180."</em></li>
                <li><strong>Pushed alerts to LINE, not email.</strong> The people who'd act on a PM2.5 spike were municipal officers already living in LINE groups. Building a web app they had to open would've been a silent tool. An auto-generated LINE message with a default recommendation — <em>"consider relocating stage event to covered zone"</em> — was a tool they opened on their own.</li>
                <li><strong>Designed the dashboard around two audiences.</strong> The municipality needed trends and budget-defence views. Vendors needed <em>"is tonight going to be worth setting up for?"</em> — same data, two framings.</li>
              </ul>
            `
          },
          {
            num: '05', kicker: 'What we shipped', title: 'A defensible evidence base — not just a chart.',
            body: `
              <p>A Smart Insight Dashboard visualising live zone-level headcounts and historical trend lines, paired with a LINE Official Account pushing AI-assessed environmental alerts to officers and users. For the first time, the municipality had a defensible evidence base: <em>here is exactly when and where people flow through our market, and here is how weather shifted it.</em></p>
              <p>Concretely, that means when the city now submits a budget request for a back-zone activation event, they can point at the dwell-time gap between zones and justify the spend. When they plan staffing, they look at historical peak curves. When air quality drops, the alert goes out <strong>before</strong> the crowd shows up.</p>
            `
          },
          {
            num: '06', kicker: "What I'd do differently", title: 'I solved the brief. I didn’t solve the system.',
            body: `
              <p>I'll be honest — we solved the <em>top-down</em> problem well. The municipality got what it needed. But I spent most of our discovery hours with city officials and not enough with the vendors whose livelihoods the dashboard ultimately affects.</p>
              <p>If I did this again:</p>
              <ul>
                <li><strong>I'd interview the back-zone vendors first.</strong> Not last. The people inside the "dead zones" likely have sharp intuitions — covered walkways, food density, lighting — that our camera data can see the symptom of but not the cause.</li>
                <li><strong>I'd ship a vendor-facing view in v1, not v2.</strong> We framed the dashboard around the municipality because they were the client. But a vendor who can see <em>"your zone gets 40% of the foot traffic between 8–9pm on clear nights"</em> has new leverage in the same conversation.</li>
                <li><strong>I'd stress-test my own assumption about LINE alerts.</strong> LINE was the right channel for officers. I never actually checked if it was the right channel for vendors, or whether they'd prefer a printed weekly summary on their stall. I assumed. That's exactly the BA move I try to avoid.</li>
              </ul>
            `,
            pull: 'Solving the stakeholder who hired you isn’t the same as solving the system. Those are two different briefs — and I should always ask which one I’m actually on.'
          }
        ],
        stakeholders: 'Lampang City Municipality · Kad Kong Ta vendors · CAMT project team',
        tools: 'Stakeholder interviews · CV-based crowd flow modelling · LINE Messaging API · Dashboard design · AI-assessed environmental alerts',
        artifactsNote: 'Dashboard screenshots, LINE alert screenshots, stakeholder maps and scope-cut diagrams will be added here.',
      }
    };

    // ═══════════════════════════════════════════
    // Render
    // ═══════════════════════════════════════════
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    const page = document.getElementById('page');

    function renderNotFound() {
      page.innerHTML = `
        <div class="not-found">
          <h1>No case file under that slug.</h1>
          <p>The link might be stale, or the case is still being written.</p>
          <a href="index.html#case-files">See all case files</a>
        </div>`;
    }

    function renderCase(c) {
      document.title = `${c.category} — Case File ${c.folio} · Naruephon Yotmao`;
      const beatsHTML = c.beats.map(b => {
        const pull = b.pull ? `<blockquote class="pull">${b.pull}</blockquote>` : '';
        const intro = b.intro ? `<p class="beat-intro">${b.intro}</p>` : '';
        return `
          <section class="beat">
            <div class="beat-num"><em>Beat ${b.num}</em> · ${b.kicker}</div>
            <h2>${b.title}</h2>
            ${intro}
            ${b.body}
            ${pull}
            ${b.after || ''}
          </section>`;
      }).join('');

      page.innerHTML = `
        <a class="case-back" href="index.html#case-files">Back to case files</a>

        <header class="case-header">
          <div class="case-flag">
            <span class="folio">Case File ${c.folio}</span>
            <span>${c.category}</span>
            <span class="dot">·</span>
            <span>${c.date}</span>
            <span class="dot">·</span>
            <span>≈ ${c.readMin} min read</span>
          </div>

          <h1 class="case-headline">${c.headline}</h1>
          <p class="case-client">${c.client}</p>

          <div class="tldr">
            <div class="tldr-item">
              <div class="tldr-label">The Ask</div>
              <div class="tldr-value">${c.tldr.problem}</div>
            </div>
            <div class="tldr-item">
              <div class="tldr-label">My Role</div>
              <div class="tldr-value">${c.tldr.role}</div>
            </div>
            <div class="tldr-item">
              <div class="tldr-label">The Outcome</div>
              <div class="tldr-value">${c.tldr.outcome}</div>
            </div>
          </div>
        </header>

        <article class="case-body">
          ${beatsHTML}
        </article>

        <footer class="case-foot">
          <div class="foot-row">
            <div class="foot-label">Artifacts</div>
            <div class="foot-value"><em>${c.artifactsNote}</em></div>
          </div>
          <div class="foot-row">
            <div class="foot-label">Stakeholders</div>
            <div class="foot-value">${c.stakeholders}</div>
          </div>
          <div class="foot-row">
            <div class="foot-label">Tools</div>
            <div class="foot-value">${c.tools}</div>
          </div>

          <div class="foot-cta">
            <p>Want to chat about civic tech, spatial analytics, or the messy politics of dashboards nobody opens?</p>
            <a href="index.html#colophon">Let's talk</a>
          </div>
        </footer>
      `;
    }

    const c = slug && CASES[slug];
    if (c) {
      renderCase(c);
    } else if (slug) {
      // Unknown slug — fall through to the Supabase-driven generic viewer.
      location.replace(`project.html?slug=${encodeURIComponent(slug)}`);
    } else {
      renderNotFound();
    }

    // Reading progress
    const fill = document.getElementById('progress-fill');
    function updateProgress() {
      const h = document.documentElement;
      const scrolled = h.scrollTop;
      const total = h.scrollHeight - h.clientHeight;
      const pct = total > 0 ? (scrolled / total) * 100 : 0;
      fill.style.width = Math.min(100, Math.max(0, pct)) + '%';
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress);
    updateProgress();
  </script>
</body>

</html>
