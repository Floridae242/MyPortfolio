<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Naruephon Yotmao</title>
  <meta name="description" content="Project details — Naruephon Yotmao's portfolio.">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="max-w-2xl mx-auto px-6 py-20 md:py-24">

    <!-- Top nav -->
    <div class="flex items-center justify-between mb-10">
      <a href="index.html" id="back-link"
        class="inline-flex items-center gap-1.5 text-sm text-zinc-600 font-mono tracking-tight hover:text-zinc-900:text-zinc-100 transition-colors group focus-visible:outline-none focus:ring-2 focus-visible:ring-zinc-400:ring-zinc-500 rounded px-2 -ml-2 py-1">
        <span class="transition-transform group-hover:-translate-x-0.5">&larr;</span>
        Back to Home
      </a>
    </div>

    <!-- Project content (populated by JS) -->
    <article id="project-content" class="hidden">

      <!-- Title -->
      <h1 id="project-title" class="text-2xl sm:text-3xl font-bold tracking-tight"></h1>

      <!-- Role & Context -->
      <p id="project-context" class="text-sm text-zinc-600 font-mono tracking-tight mt-2"></p>

      <!-- Tech stack badges -->
      <div id="project-tech" class="flex flex-wrap gap-2 mt-4"></div>

      <!-- Project image (shown if available) -->
      <div id="project-image-wrapper" class="hidden mt-8">
        <img id="project-image" src="" alt="" class="w-full rounded-xl border border-zinc-200 shadow-sm" onerror="this.parentElement.style.display='none'">
      </div>

      <hr class="border-zinc-200 my-8">

      <!-- The Problem -->
      <div id="project-problem-wrapper" class="hidden mb-8">
        <h2 class="text-sm font-bold text-zinc-900 uppercase tracking-wider mb-2">The Problem</h2>
        <p id="project-problem" class="text-base leading-relaxed text-zinc-700 max-w-prose"></p>
      </div>

      <!-- Full description (The Solution) -->
      <div class="mb-8">
        <h2 class="text-sm font-bold text-zinc-900 uppercase tracking-wider mb-2">What I Built</h2>
        <div id="project-description" class="prose-custom space-y-4"></div>
      </div>

      <!-- Key Learnings -->
      <div id="project-learnings-wrapper" class="hidden mb-8">
        <h2 class="text-sm font-bold text-zinc-900 uppercase tracking-wider mb-2">Key Learnings</h2>
        <ul id="project-learnings" class="space-y-2"></ul>
      </div>

      <!-- Result -->
      <div id="project-result-wrapper" class="hidden mb-8">
        <h2 class="text-sm font-bold text-zinc-900 uppercase tracking-wider mb-2">Result</h2>
        <p id="project-result" class="text-base leading-relaxed text-zinc-700 max-w-prose"></p>
      </div>

      <hr class="border-zinc-200 my-8">

      <!-- Links -->
      <div id="project-links" class="flex flex-wrap gap-4"></div>

    </article>

    <!-- Not found state -->
    <div id="not-found" class="hidden text-center py-20">
      <p class="text-lg text-zinc-600">Project not found.</p>
      <a href="index.html" class="text-accent underline underline-offset-2 text-sm mt-2 inline-block">Go back
        home</a>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-zinc-200 py-10 mt-10 text-center flex flex-col items-center justify-center gap-2">
    <p class="text-sm font-mono tracking-tight text-zinc-700 opacity-90"><span class="italic font-sans">Handcrafted by</span> Naruephon Yotmao</p>
    <p class="text-xs text-zinc-600 font-mono tracking-tight opacity-75">Last Updated: April 2026</p>
  </footer>

  <!-- Data & Rendering -->
  <script src="data/projects.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      const project = projectsData.find((p) => p.slug === slug);

      if (!project) {
        document.getElementById("not-found").classList.remove("hidden");
        return;
      }

      // Update page title
      document.title = `${project.title} — Naruephon Yotmao`;

      // Title
      document.getElementById("project-title").textContent = project.title;

      // Context & role
      const contextEl = document.getElementById("project-context");
      contextEl.textContent = `${project.role} · ${project.context}`;

      // Tech stack
      const techEl = document.getElementById("project-tech");
      project.techStack.forEach((tech) => {
        const span = document.createElement("span");
        span.className =
          "skill-tag px-3 py-1.5 text-sm font-medium rounded-full bg-zinc-100 text-zinc-700 border border-zinc-200";
        span.textContent = tech;
        techEl.appendChild(span);
      });

      // Project image
      const imgWrapper = document.getElementById("project-image-wrapper");
      const imgEl = document.getElementById("project-image");
      if (project.imageUrl) {
        imgEl.src = project.imageUrl;
        imgEl.alt = `${project.title} poster`;
        imgWrapper.classList.remove("hidden");
      }

      // The Problem
      if (project.problemSolved) {
        const problemWrapper = document.getElementById("project-problem-wrapper");
        document.getElementById("project-problem").textContent = project.problemSolved;
        problemWrapper.classList.remove("hidden");
      }

      // Description paragraphs (What I Built)
      const descEl = document.getElementById("project-description");
      project.fullDescription.split("\n\n").forEach((para) => {
        const p = document.createElement("p");
        p.className = "text-base leading-relaxed text-zinc-700 max-w-prose";
        p.textContent = para.trim();
        descEl.appendChild(p);
      });

      // Key Learnings
      if (project.keyLearnings && project.keyLearnings.length > 0) {
        const learningsWrapper = document.getElementById("project-learnings-wrapper");
        const learningsEl = document.getElementById("project-learnings");
        project.keyLearnings.forEach((lesson) => {
          const li = document.createElement("li");
          li.className = "flex items-start gap-2 text-sm text-zinc-700 leading-relaxed";
          li.innerHTML = `<span class="text-accent mt-0.5 flex-shrink-0">›</span> ${lesson}`;
          learningsEl.appendChild(li);
        });
        learningsWrapper.classList.remove("hidden");
      }

      // Result
      if (project.result) {
        const resultWrapper = document.getElementById("project-result-wrapper");
        document.getElementById("project-result").textContent = project.result;
        resultWrapper.classList.remove("hidden");
      }

      // Links
      const linksEl = document.getElementById("project-links");
      if (project.githubUrl) {
        const a = document.createElement("a");
        a.href = project.githubUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className =
          "text-sm text-accent hover:opacity-70 underline underline-offset-2";
        a.textContent = "Source Code →";
        linksEl.appendChild(a);
      }
      if (project.liveUrl) {
        const a = document.createElement("a");
        a.href = project.liveUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className =
          "text-sm text-accent hover:opacity-70 underline underline-offset-2";
        a.textContent = "Live Site →";
        linksEl.appendChild(a);
      }
      if (project.canvaUrl) {
        const a = document.createElement("a");
        a.href = project.canvaUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className =
          "text-sm text-accent hover:opacity-70 underline underline-offset-2";
        a.textContent = "Presentation →";
        linksEl.appendChild(a);
      }

      // If no links at all, hide the links section
      if (!project.githubUrl && !project.liveUrl && !project.canvaUrl) {
        linksEl.previousElementSibling.remove();
        linksEl.remove();
      }

      // Show content
      document.getElementById("project-content").classList.remove("hidden");
    })();
  </script>
</body>

</html>
