<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin — Content Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50">
  <div class="min-h-screen max-w-4xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Portfolio Admin</h1>
      <p class="text-stone-600">Manage your certificates and projects content</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 mb-8 border-b border-stone-200">
      <button class="tab-btn active px-4 py-2 font-medium text-stone-700 border-b-2 border-stone-800 cursor-pointer" data-tab="certificates">
        Certificates
      </button>
      <button class="tab-btn px-4 py-2 font-medium text-stone-500 border-b-2 border-transparent cursor-pointer hover:text-stone-700" data-tab="projects">
        Projects
      </button>
    </div>

    <!-- Certificates Tab -->
    <div class="tab-content active" id="certificates-tab">
      <div class="mb-6">
        <button id="add-cert-btn" class="px-4 py-2 bg-stone-800 text-white rounded-lg hover:bg-stone-700 transition">
          + Add Certificate
        </button>
      </div>

      <div id="certificates-container" class="space-y-4">
        <!-- Certificates will be loaded here -->
      </div>
    </div>

    <!-- Projects Tab -->
    <div class="tab-content hidden" id="projects-tab">
      <div class="mb-6">
        <p class="text-sm text-stone-600">Projects are currently read-only. Edit <code class="bg-stone-100 px-2 py-1 rounded">data/projects.js</code> directly.</p>
      </div>
      <div id="projects-container" class="space-y-4">
        <!-- Projects will be loaded here -->
      </div>
    </div>

    <!-- Certificate Form Modal -->
    <div id="cert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-6">
        <h2 class="text-xl font-bold mb-4">Add / Edit Certificate</h2>
        
        <form id="cert-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Title *</label>
            <input type="text" id="cert-title" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-800" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Issuer *</label>
            <input type="text" id="cert-issuer" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-800" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Date Issued *</label>
            <input type="date" id="cert-date" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-800" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Credential URL (optional)</label>
            <input type="url" id="cert-url" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-800" placeholder="https://...">
          </div>

          <div class="flex gap-3 pt-4">
            <button type="button" id="close-modal-btn" class="flex-1 px-4 py-2 border border-stone-300 rounded-lg hover:bg-stone-50">
              Cancel
            </button>
            <button type="submit" class="flex-1 px-4 py-2 bg-stone-800 text-white rounded-lg hover:bg-stone-700">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="data/certificates.js"></script>
  <script>
    let editingId = null;
    let localCerts = JSON.parse(JSON.stringify(certificatesData));

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.toggle('active', b === e.target);
          b.classList.toggle('border-stone-800', b === e.target);
          b.classList.toggle('border-transparent', b !== e.target);
          b.classList.toggle('text-stone-700', b === e.target);
          b.classList.toggle('text-stone-500', b !== e.target);
        });
        document.querySelectorAll('.tab-content').forEach(tab => {
          tab.classList.toggle('hidden', !tab.id.includes(tabName));
          tab.classList.toggle('active', tab.id.includes(tabName));
        });
      });
    });

    // Modal controls
    const modal = document.getElementById('cert-modal');
    const addBtn = document.getElementById('add-cert-btn');
    const closeBtn = document.getElementById('close-modal-btn');
    const form = document.getElementById('cert-form');

    addBtn.addEventListener('click', () => {
      editingId = null;
      form.reset();
      modal.classList.remove('hidden');
    });

    closeBtn.addEventListener('click', () => modal.classList.add('hidden'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.add('hidden');
    });

    // Form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const cert = {
        id: editingId || Math.max(...localCerts.map(c => c.id || 0), 0) + 1,
        title: document.getElementById('cert-title').value,
        issuer: document.getElementById('cert-issuer').value,
        dateIssued: document.getElementById('cert-date').value,
        credentialUrl: document.getElementById('cert-url').value || null,
        image: null
      };

      if (editingId) {
        const idx = localCerts.findIndex(c => c.id === editingId);
        localCerts[idx] = cert;
      } else {
        localCerts.push(cert);
      }

      // Save to localStorage
      localStorage.setItem('portfolioCerts', JSON.stringify(localCerts));
      renderCertificates();
      modal.classList.add('hidden');
      showNotification('Certificate saved successfully!');
    });

    // Render certificates
    function renderCertificates() {
      const container = document.getElementById('certificates-container');
      
      if (localCerts.length === 0) {
        container.innerHTML = '<p class="text-sm text-stone-500">No certificates yet. Click "Add Certificate" to get started.</p>';
        return;
      }

      container.innerHTML = localCerts
        .sort((a, b) => new Date(b.dateIssued) - new Date(a.dateIssued))
        .map(cert => {
          const date = new Date(cert.dateIssued).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          return `
            <div class="p-4 border border-stone-200 rounded-lg flex justify-between items-start">
              <div class="flex-1">
                <p class="font-medium text-stone-800">${cert.title}</p>
                <p class="text-sm text-stone-500">${cert.issuer}</p>
                <p class="text-xs text-stone-400 mt-1">${date}</p>
              </div>
              <div class="flex gap-2">
                <button class="edit-btn text-xs px-2 py-1 bg-stone-100 rounded hover:bg-stone-200" data-id="${cert.id}">Edit</button>
                <button class="delete-btn text-xs px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100" data-id="${cert.id}">Delete</button>
              </div>
            </div>
          `;
        })
        .join('');

      // Attach event listeners
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', editCertificate);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', deleteCertificate);
      });
    }

    function editCertificate(e) {
      const id = parseInt(e.target.dataset.id);
      const cert = localCerts.find(c => c.id === id);
      
      editingId = id;
      document.getElementById('cert-title').value = cert.title;
      document.getElementById('cert-issuer').value = cert.issuer;
      document.getElementById('cert-date').value = cert.dateIssued;
      document.getElementById('cert-url').value = cert.credentialUrl || '';
      
      modal.classList.remove('hidden');
    }

    function deleteCertificate(e) {
      const id = parseInt(e.target.dataset.id);
      if (confirm('Are you sure you want to delete this certificate?')) {
        localCerts = localCerts.filter(c => c.id !== id);
        localStorage.setItem('portfolioCerts', JSON.stringify(localCerts));
        renderCertificates();
        showNotification('Certificate deleted.');
      }
    }

    // Render projects (read-only)
    function renderProjects() {
      const container = document.getElementById('projects-container');
      container.innerHTML = (projectsData || [])
        .map(proj => `
          <div class="p-4 border border-stone-200 rounded-lg">
            <p class="font-medium text-stone-800">${proj.title}</p>
            <p class="text-sm text-stone-500 mt-1">${proj.shortDescription}</p>
            <div class="flex gap-2 mt-2">
              ${proj.githubUrl ? `<a href="${proj.githubUrl}" target="_blank" class="text-xs text-stone-600 hover:text-stone-800">GitHub</a>` : ''}
              ${proj.liveUrl ? `<a href="${proj.liveUrl}" target="_blank" class="text-xs text-stone-600 hover:text-stone-800">Live</a>` : ''}
            </div>
          </div>
        `)
        .join('');
    }

    function showNotification(msg) {
      const notif = document.createElement('div');
      notif.className = 'fixed bottom-4 right-4 bg-stone-800 text-white px-4 py-2 rounded-lg text-sm';
      notif.textContent = msg;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    // Initialize
    function init() {
      const saved = localStorage.getItem('portfolioCerts');
      if (saved) {
        localCerts = JSON.parse(saved);
      }
      renderCertificates();
      renderProjects();
    }

    init();
  </script>
</body>
</html>
